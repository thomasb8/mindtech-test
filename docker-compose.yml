services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mindtech?schema=public
      JWT_SECRET: supersecret
      CORS_ORIGINS: http://localhost:3001
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mindtech
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
